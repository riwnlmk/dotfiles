<?xml version='1.0'?>

<!-- Fontconfig configuration file -->
<!DOCTYPE fontconfig SYSTEM 'fonts.dtd'>

<fontconfig>

  <!-- Set default serif font -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>serif</string>
    </test>

    <!-- Prefer Qayyum Book for serif text -->
    <edit name="family" mode="prepend" binding="strong">
      <string>Qayyum Book</string>
    </edit>
  </match>

  <!-- Set default sans-serif font -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>sans-serif</string>
    </test>

    <!-- Prefer Qayyum Book for sans-serif text -->
    <edit name="family" mode="prepend" binding="strong">
      <string>Qayyum Book</string>
    </edit>
  </match>

  <!-- Set default monospace font -->
  <match target="pattern">
    <test qual="any" name="family">
      <string>monospace</string>
    </test>

    <!-- Prefer JetBrainsMono Nerd Font for monospace text -->
    <edit name="family" mode="prepend" binding="strong">
      <string>JetBrainsMono Nerd Font</string>
    </edit>
  </match>

</fontconfig>